services:
  postgres:
    image: postgres:14-alpine
    container_name: entrades-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: entrades
      DB_HOST: entrades-postgres
      DB_PORT: 5432
      DB_NAME: entrades
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: entrades-backend
    working_dir: /app/backend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@entrades-postgres:5432/entrades
      DB_HOST: entrades-postgres
      DB_PORT: 5432
      DB_NAME: entrades
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      RESERVA_DURADA_MINUTS: 5
      MAX_SEIENTS_PER_RESERVA: 3
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: entrades-frontend
    working_dir: /app/frontend
    command: npm run dev
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:3000/api
      NUXT_PUBLIC_SOCKET_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data:
