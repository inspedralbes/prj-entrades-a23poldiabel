services:
  postgres:
    image: postgres:14-alpine
    container_name: entrades-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: laravel
    container_name: entrades-api-prod
    restart: unless-stopped
    working_dir: /app/backend-laravel
    command: sh -c "php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://${DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://${DOMAIN}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY}
      TICKETMASTER_COUNTRY_CODE: ${TICKETMASTER_COUNTRY_CODE}
      TICKETMASTER_CITY: ${TICKETMASTER_CITY}
      TICKETMASTER_SIZE: ${TICKETMASTER_SIZE}
      DB_CONNECTION: pgsql
      DB_URL: ""
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/api/events >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  sockets:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: entrades-sockets-prod
    restart: unless-stopped
    working_dir: /app/backend
    command: npm run start:sockets
    environment:
      NODE_ENV: production
      SOCKET_PORT: 3000
      SOCKET_CORS_ORIGINS: https://${DOMAIN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAX_SEIENTS_PER_RESERVA: ${MAX_SEIENTS_PER_RESERVA}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: entrades-frontend-prod
    restart: unless-stopped
    working_dir: /app/frontend
    command: sh -c "NITRO_HOST=0.0.0.0 NITRO_PORT=3001 node .output/server/index.mjs"
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_URL: https://${DOMAIN}/api
      NUXT_PUBLIC_SOCKET_URL: https://${DOMAIN}
    depends_on:
      - api
      - sockets
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3001/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: entrades-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
      sockets:
        condition: service_started

  certbot:
    image: certbot/certbot:latest
    container_name: entrades-certbot-prod
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data_prod:
  certbot_www:
  certbot_certs:
